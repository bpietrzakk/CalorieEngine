services:
  db:
    image: postgres:16-alpine
    container_name: calorie_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: calorie_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/postgres_data

volumes:
  postgres_data: